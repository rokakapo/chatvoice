name: chatvoice
description: "AI-Powered Call Answering Assistant - تطبيق الرد الآلي على المكالمات بالذكاء الاصطناعي"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # HTTP & Networking
  http: ^1.2.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Audio
  just_audio: ^0.9.36
  path_provider: ^2.1.2
  
  # UI & Animations
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Icons
  flutter_svg: ^2.0.9
  icons_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/animations/
